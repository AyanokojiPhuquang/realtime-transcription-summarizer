<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Transcription Summarizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <h1 class="text-xl font-semibold text-white">Realtime Transcription Summarizer</h1>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 flex flex-col gap-6">
        <!-- Error Area -->
        <div id="errorArea" class="hidden bg-red-900/50 border border-red-700 text-red-200 px-4 py-3 rounded-lg text-sm" role="alert"></div>

        <!-- Controls -->
        <div class="flex gap-3">
            <button id="startBtn"
                class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Start Capture
            </button>
            <button id="stopBtn" disabled
                class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Stop Capture
            </button>
        </div>

        <!-- Video Preview -->
        <div>
            <h2 class="text-sm font-medium text-gray-400 mb-2">Screen Preview</h2>
            <div class="w-full aspect-video bg-black rounded-lg border border-gray-700 overflow-hidden">
                <video id="videoPreview" muted autoplay playsinline
                    class="w-full h-full object-contain"></video>
            </div>
        </div>

        <!-- Transcription Area -->
        <div>
            <h2 class="text-sm font-medium text-gray-400 mb-2">Live Transcription</h2>
            <div id="transcriptionArea"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-4 text-base text-gray-200 truncate h-14 flex items-center"
            ></div>
        </div>

        <!-- Summary Area -->
        <div>
            <h2 class="text-sm font-medium text-gray-400 mb-2">Summary</h2>
            <div id="summaryArea"
                class="min-h-[100px] w-full bg-gray-800 border border-gray-700 rounded-lg p-4 text-sm text-gray-200 whitespace-pre-wrap"
            >Summary will appear here after stopping capture.</div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
